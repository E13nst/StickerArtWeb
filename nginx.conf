# Кэш для стикеров (агрессивное кэширование)
# Используем /data для persistent storage (не очищается при деплое)
# proxy_cache_path должна быть в http контексте, не в server
proxy_cache_path /data/cache/nginx/stickers 
    levels=1:2 
    keys_zone=sticker_cache:64m 
    inactive=14d 
    max_size=2g 
    use_temp_path=off;

# Кэшировать только когда запрошен файл стикера (?file=true|1)
map $arg_file $stickers_cache_bypass {
    default 1;
    ""      1;
    0        1;
    false    1;
    true     0;
    1        0;
}

# Логирование статистики кэша
log_format cache_stats '$time_local|$remote_addr|$request_method|$request_uri|'
                       'cache_status=$upstream_cache_status|'
                       'cache_key="$request_uri"|'
                       'status=$status|bytes=$body_bytes_sent';

server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Лог для статистики кэша
    access_log /var/log/nginx/cache_stats.log cache_stats;
    error_log /var/log/nginx/error.log warn;
    
    # Gzip compression (улучшенная конфигурация)
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    # Добавляем сжатие для JSON (анимации стикеров) и других типов
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json image/svg+xml;
    gzip_proxied any;
    gzip_disable "msie6";
    
    # Brotli compression (если модуль доступен, лучше чем gzip)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript application/javascript application/json image/svg+xml;
    
    # Прямой прокси к sticker-processor (новый путь /stickers/)
    location ~ ^/stickers/[^/]+$ {
        proxy_pass ${STICKER_PROCESSOR_ORIGIN};

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        
        # 🔥 ОПТИМИЗАЦИЯ: Передаем Accept заголовки для поддержки WebP/AVIF
        # Если браузер поддерживает WebP, передаем это в sticker-processor
        # (sticker-processor может отдавать WebP если поддерживается)
        proxy_set_header Accept $http_accept;

        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 4 128k;
        proxy_busy_buffers_size 128k;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_cache sticker_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_min_uses 1;
        proxy_cache_valid 200 14d;
        proxy_cache_valid 404 1m;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        # ✅ ИСПРАВЛЕНО: объединяем proxy_cache_bypass в одну строку (убрано дублирование)
        proxy_cache_bypass $http_upgrade $stickers_cache_bypass;
        proxy_no_cache $stickers_cache_bypass;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_revalidate on;

        # ✅ ДОБАВЛЕНО: отладочные заголовки для диагностики кеша
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Cache-Key "$request_uri" always;
        add_header X-Cache-Bypass "$stickers_cache_bypass" always;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Telegram-Init-Data, X-Telegram-Bot-Name" always;
        add_header Cache-Control "public, max-age=1209600" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Upload и выдача исходных изображений через sticker-processor
    location /images {
        proxy_pass ${STICKER_PROCESSOR_ORIGIN};

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Telegram-Init-Data, X-Telegram-Bot-Name" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # API proxy для всех запросов (включая /api/auth)
    location /api {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Telegram-Init-Data, X-Telegram-Bot-Name" always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # Telegram Mini App - точное совпадение /miniapp/
    location = /miniapp/ {
        try_files /miniapp/index.html =404;
        # ✅ CRITICAL: не кэшировать HTML entrypoint (иначе залипают старые chunk-хэши)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Frame-Options "ALLOW-FROM https://web.telegram.org" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
    
    # Telegram Mini App - без завершающего слэша → редирект на /
    location = /miniapp {
        return 301 /miniapp/;
    }
    
    # ✅ FIX: Service Worker - добавляем заголовок Service-Worker-Allowed
    location = /miniapp/sw.js {
        try_files /miniapp/sw.js =404;
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Type "application/javascript; charset=utf-8" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    
    # Telegram Mini App - статические ассеты с хэшами (кэшировать долго)
    location ~* ^/miniapp/assets/.*\.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|webp|avif)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "ALLOW-FROM https://web.telegram.org" always;
    }
    
    # Telegram Mini App - все файлы и SPA routing
    location /miniapp/ {
        try_files $uri /miniapp/index.html;
        # ✅ FIX: Не кэшировать index.html чтобы обновления применялись сразу
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Frame-Options "ALLOW-FROM https://web.telegram.org" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
    
    # Favicon обработка
    location = /favicon.ico {
        try_files /favicon.ico =204;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Кеширование статических файлов (только с хэшами в имени)
    # Файлы типа vendor-BZHYcSyn.js кэшируются долго, т.к. хэш меняется при изменении
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Vary "Accept-Encoding" always;
    }
    
    # ✅ FIX: HTML файлы НЕ кэшировать (чтобы обновления применялись сразу)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # ✅ Диагностика: видимый build-id (помогает понять, какой образ реально крутится на проде)
    location = /build.txt {
        default_type text/plain;
        try_files /build.txt =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location = /miniapp/build.txt {
        default_type text/plain;
        try_files /miniapp/build.txt =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    
    # Landing page - корень сайта
    location / {
        try_files $uri /index.html;
        # ✅ FIX: Не кэшировать index.html
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header X-Frame-Options "ALLOW-FROM https://web.telegram.org" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
    
    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Статистика кэша - простая HTML страница
    location = /cache-stats {
        default_type text/html;
        try_files /cache-stats.html =404;
        add_header Content-Type "text/html; charset=utf-8" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    
    # API endpoint для получения информации о кэше
    location = /api/cache-info {
        default_type application/json;
        access_log off;
        add_header Content-Type "application/json; charset=utf-8" always;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Cache-Control "no-cache" always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        
        # Отдаем статический JSON файл со статистикой кэша
        try_files /cache-info.json =404;
    }
}
